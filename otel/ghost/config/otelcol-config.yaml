# OpenTelemetry Collector — ghost aggregator
# CNCF Incubating — https://opentelemetry.io/
#
# Receives OTLP from all node agents.
# Exports: logs → Loki (OTLP), metrics → Prometheus (remote write).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1000
  memory_limiter:
    check_interval: 1s
    limit_mib: 512

exporters:
  # Logs → Loki via OTLP (Loki 3.x native endpoint)
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  # Metrics → Prometheus via remote write
  # resource_to_telemetry_conversion promotes resource attributes (host.name,
  # process.executable.name, os.type, etc.) to Prometheus metric labels.
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    resource_to_telemetry_conversion:
      enabled: true
    tls:
      insecure: true

service:
  # Bind internal metrics to 0.0.0.0 so Prometheus can scrape port 8888
  # (default is localhost:8888, which is unreachable through Podman port publish)
  telemetry:
    metrics:
      address: 0.0.0.0:8888
  pipelines:
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/loki]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheusremotewrite]
