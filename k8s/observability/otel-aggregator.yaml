apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-aggregator-config
  namespace: observability
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    exporters:
      otlphttp:
        endpoint: http://loki.observability.svc.cluster.local:3100/otlp
        tls:
          insecure: true
      prometheusremotewrite:
        endpoint: http://prometheus.observability.svc.cluster.local:9090/api/v1/write
        tls:
          insecure: true
    service:
      pipelines:
        logs:
          receivers: [otlp]
          exporters: [otlphttp]
        metrics:
          receivers: [otlp]
          exporters: [prometheusremotewrite]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-aggregator
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-aggregator
  template:
    metadata:
      labels:
        app: otel-aggregator
    spec:
      hostNetwork: true
      containers:
        - name: otelcol
          image: otel/opentelemetry-collector-contrib:0.104.0
          args: ["--config=/etc/otelcol/config.yaml"]
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
          ports:
            - containerPort: 4317
              hostPort: 4317
              protocol: TCP
            - containerPort: 4318
              hostPort: 4318
              protocol: TCP
      volumes:
        - name: config
          configMap:
            name: otel-aggregator-config
